apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecoplan
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      # ecoscan service exposes /metrics on its metrics port.
      # The endpoint is a placeholder today; real metrics land when
      # the service code is instrumented.
      - job_name: ecoscan-service
        static_configs:
          - targets: ['ecoscan-service:9090']
        metrics_path: /metrics

      # OTel Collector — OTLP metrics pipeline exposes a scrape endpoint.
      - job_name: otel-collector
        static_configs:
          - targets: ['otel-collector:8889']
