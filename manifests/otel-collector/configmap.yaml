apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: ecoplan
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      # In-cluster only. No public OTLP ingress — ecoscan-service is the sole
      # producer and pushes via the cluster DNS endpoint.
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512
      memory_limiter:
        check_interval: 1s
        limit_mib: 200

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      # Loki v3+ accepts OTLP logs directly at /otlp.
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: normal

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus, debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki, debug]
