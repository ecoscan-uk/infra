apiVersion: v1
kind: ConfigMap
metadata:
  name: ecoscan-config
  namespace: ecoplan
data:
  GRPC_PORT: "50051"
  METRICS_PORT: "9090"
  LOG_LEVEL: "info"
  CLAUDE_MODEL: "claude-sonnet-4-6"
  OFF_BASE_URL: "https://world.openfoodfacts.org"
  OFF_TIMEOUT: "5s"
  CLAUDE_TIMEOUT: "15s"
  # OTel endpoints — infra is ready; service code honours these once instrumentation lands.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "ecoscan-service"
