name: Terraform

on:
  push:
    branches: [trunk]
    paths: [terraform/**]
  pull_request:
    paths: [terraform/**]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VAR_hetzner_token: ${{ secrets.HETZNER_TOKEN }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_domain: "ecoplan.uk"
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: fmt
        run: terraform fmt -check -recursive

      - name: init
        run: terraform init -backend-config=backend.hcl

      - name: validate
        run: terraform validate

  plan:
    name: plan
    needs: validate
    runs-on: ubuntu-latest
    environment: terraform-plan
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: init
        run: terraform init -backend-config=backend.hcl

      - name: plan
        run: |
          terraform plan -no-color -input=false -out=tfplan
          terraform show -json tfplan > plan.json

      - name: summary
        uses: danielriddell21/tf-plan-summary-action@v1
        with:
          plan-file: terraform/plan.json

      - name: upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  apply:
    name: apply
    needs: plan
    runs-on: ubuntu-latest
    environment: terraform-apply
    if: github.ref == 'refs/heads/trunk' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: init
        run: terraform init -backend-config=backend.hcl

      - name: download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: upload errored state
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: errored-tfstate
          path: terraform/errored.tfstate
          retention-days: 7
